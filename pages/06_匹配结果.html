<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 匹配结果</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .page { display: flex; flex-direction: column; }
  .topbar {
    height: 48px; padding: 0 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
  }
  .topbar .back svg { width: 18px; height: 18px; }
  .topbar h2 { font-size: 16px; font-weight: 600; color: var(--fg); }

  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 4px 22px 22px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .header { padding: 4px 0 14px; }
  .header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg);
  }
  .header p {
    margin-top: 4px;
    font-size: 13px; color: var(--fg-mute);
  }

  /* 紧凑卡 */
  .card {
    display: flex; align-items: center; gap: 12px;
    padding: 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all var(--d-1) var(--ease);
  }
  .card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .card:active { transform: scale(0.99); }
  .card.hot {
    border: 1.5px solid var(--accent);
    background: linear-gradient(180deg, var(--accent-soft) 0%, var(--bg-elev) 60%);
  }

  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 17px; font-weight: 600;
    flex-shrink: 0;
  }

  .info { flex: 1; min-width: 0; }
  .name-line {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; color: var(--fg);
  }
  .pct { font-size: 13px; font-weight: 700; color: var(--accent); }
  .meta { font-size: 12px; color: var(--fg-mute); margin-top: 2px; }
  .tags-line {
    font-size: 12px; color: var(--fg-mute); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .arr {
    width: 16px; height: 16px;
    color: var(--fg-faint);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="topbar">
    <button class="back" data-back aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2>合拍搭子</h2>
    <span style="width:36px"></span>
  </div>

  <div class="scroll">
    <div class="header">
      <h1>今日匹配</h1>
      <p>3 个合拍搭子 · 点开看详情和 AI 推荐</p>
    </div>

    <div id="list"></div>

    <p style="text-align:center;font-size:12px;color:var(--fg-faint);margin-top:18px;">
      明天还有 1 次新匹配 · 晚安
    </p>
  </div>
</div>

<script>
  const matches = [
    { id: 'linxi', initial: '林', name: '林夕',  pct: 92, gender: '女', age: 23, city: '杭州', hot: true,  tags: '徒步 · 电影 · 咖啡' },
    { id: 'miya',  initial: 'M',  name: 'Miya',  pct: 76, gender: '女', age: 25, city: '杭州', hot: false, tags: '摄影 · 读书 · 旅行' },
    { id: 'kayla', initial: 'K',  name: 'Kayla', pct: 71, gender: '女', age: 24, city: '杭州', hot: false, tags: '脱口秀 · 音乐节' }
  ];

  document.getElementById('list').innerHTML = matches.map(m => `
    <div class="card ${m.hot ? 'hot' : ''}" data-id="${m.id}">
      <div class="avatar">${m.initial}</div>
      <div class="info">
        <div class="name-line"><span>${m.name}</span><span class="pct">${m.pct}%</span></div>
        <div class="meta">${m.gender} · ${m.age} 岁 · ${m.city}</div>
        <div class="tags-line">${m.tags}</div>
      </div>
      <svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  `).join('');

  function goPage(target) {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  }

  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => goPage('07_用户详情.html?id=' + c.dataset.id));
  });

  document.querySelector('[data-back]').addEventListener('click', () => goPage('03_首页.html'));

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
