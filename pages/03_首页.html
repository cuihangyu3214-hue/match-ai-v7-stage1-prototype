<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 首页</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .page { display: flex; flex-direction: column; }

  /* 顶部 brand bar */
  .brandbar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 24px 12px;
  }
  .brand-name {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg);
  }
  .brand-name .dot { color: var(--accent); }
  .city-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 10px; border-radius: var(--r-pill);
    background: var(--bg-elev); border: 1px solid var(--border);
    font-size: 12px; color: var(--fg); font-weight: 500;
    cursor: pointer;
    transition: all var(--d-1) var(--ease);
  }
  .city-chip:hover { border-color: var(--accent); color: var(--accent); }
  .city-chip svg { width: 12px; height: 12px; color: var(--fg-mute); }
  .city-chip:hover svg { color: var(--accent); }

  /* 滚动区 */
  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 4px 20px 20px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* 模块卡 */
  .module {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 14px;
    transition: all var(--d-1) var(--ease);
  }
  .module.locked { opacity: 0.5; }

  .module-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .module-emoji {
    font-size: 18px; line-height: 1;
  }
  .module-title {
    font-size: 15px; font-weight: 600;
    color: var(--fg); letter-spacing: -0.01em;
    flex: 1;
  }
  .module-freq {
    font-size: 11px; color: var(--fg-mute);
    padding: 3px 8px; background: var(--bg-app);
    border-radius: var(--r-pill);
  }

  /* 内嵌结果行 */
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: background var(--d-1) var(--ease);
  }
  .row + .row { margin-top: 2px; }
  .row:hover { background: var(--bg-app); }

  .mini-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }
  .row-info { flex: 1; min-width: 0; }
  .row-name {
    font-size: 14px; font-weight: 600; color: var(--fg);
    display: flex; align-items: center; gap: 8px;
  }
  .row-pct {
    font-size: 12px; font-weight: 700; color: var(--accent);
  }
  .row-tags {
    font-size: 11px; color: var(--fg-mute);
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row-arr {
    width: 14px; height: 14px;
    color: var(--fg-faint);
    flex-shrink: 0;
  }

  /* 激活提示行 */
  .activate-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 12px;
    background: var(--accent-soft);
    border-radius: 14px;
    cursor: pointer;
    transition: all var(--d-1) var(--ease);
  }
  .activate-row:hover { background: var(--accent); color: white; }
  .activate-row:hover .ac-text,
  .activate-row:hover .ac-arr { color: white; }
  .ac-text { font-size: 14px; font-weight: 600; color: var(--accent); }
  .ac-arr { width: 16px; height: 16px; color: var(--accent); }

  /* 空占位 */
  .placeholder {
    text-align: center;
    padding: 18px 12px;
    color: var(--fg-faint);
  }
  .placeholder .pri { font-size: 13px; font-weight: 500; color: var(--fg-mute); }
  .placeholder .sec { font-size: 11px; margin-top: 2px; }

  /* 吸底 Tab */
  .tab-bar {
    flex-shrink: 0;
    display: flex; align-items: stretch;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab {
    flex: 1; padding: 10px 0 8px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--fg-faint);
    cursor: pointer;
    transition: color var(--d-1) var(--ease);
  }
  .tab:hover, .tab.active { color: var(--accent); }
  .tab svg { width: 22px; height: 22px; stroke-width: 2; }
  .tab span { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }

  /* Toast */
  .toast {
    position: absolute; top: 60px; left: 24px; right: 24px;
    padding: 12px 16px;
    background: var(--fg); color: var(--bg-elev);
    border-radius: var(--r-md);
    font-size: 13px; font-weight: 500;
    text-align: center;
    box-shadow: var(--shadow-2);
    transform: translateY(-20px); opacity: 0; pointer-events: none;
    transition: all var(--d-2) var(--ease);
    z-index: 50;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="brandbar">
    <span class="brand-name">Match AI<span class="dot">.</span></span>
    <span class="city-chip" onclick="showToast('城市切换待开放')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-7-7.58-7-13a7 7 0 0 1 14 0c0 5.42-7 13-7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
      <span id="city">杭州</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5"><polyline points="9 18 15 12 9 6"/></svg>
    </span>
  </div>

  <div class="scroll">

    <!-- 合拍搭子 -->
    <div class="module" id="mod-buddy">
      <div class="module-head">
        <span class="module-emoji">🤝</span>
        <span class="module-title">合拍搭子</span>
        <span class="module-freq">每天 1 次</span>
      </div>
      <div id="buddy-body"><!-- 动态注入 --></div>
    </div>

    <!-- 合拍伴侣 -->
    <div class="module locked">
      <div class="module-head">
        <span class="module-emoji">💕</span>
        <span class="module-title">合拍伴侣</span>
        <span class="module-freq">周四 20:00</span>
      </div>
      <div class="placeholder">
        <div class="pri">暂未开放</div>
        <div class="sec">即将上线</div>
      </div>
    </div>

    <!-- 实习求职 -->
    <div class="module locked">
      <div class="module-head">
        <span class="module-emoji">💼</span>
        <span class="module-title">实习求职</span>
        <span class="module-freq">每周 1 次</span>
      </div>
      <div class="placeholder">
        <div class="pri">暂未开放</div>
        <div class="sec">即将上线</div>
      </div>
    </div>

    <!-- 技能交换 -->
    <div class="module locked">
      <div class="module-head">
        <span class="module-emoji">🔄</span>
        <span class="module-title">技能交换</span>
        <span class="module-freq">每 3 天 1 次</span>
      </div>
      <div class="placeholder">
        <div class="pri">暂未开放</div>
        <div class="sec">即将上线</div>
      </div>
    </div>

    <!-- 易物 -->
    <div class="module locked">
      <div class="module-head">
        <span class="module-emoji">📦</span>
        <span class="module-title">易物</span>
        <span class="module-freq">每周 1 次</span>
      </div>
      <div class="placeholder">
        <div class="pri">暂未开放</div>
        <div class="sec">即将上线</div>
      </div>
    </div>

  </div>

  <div class="tab-bar">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>首页</span>
    </div>
    <div class="tab" onclick="showToast('圈子 Tab 待阶段 3 实现')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
      <span>圈子</span>
    </div>
    <div class="tab" onclick="showToast('我的 Tab 待阶段 3 实现')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
      <span>我的</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function goPage(target) {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  }

  // 城市
  const city = localStorage.getItem('matchai_city') || '杭州';
  document.getElementById('city').textContent = city;

  // 内嵌结果数据（也复用为详情页数据源）
  const buddyMatches = [
    { id: 'linxi',  initial: '林', name: '林夕',  pct: 92, tags: '徒步 · 电影 · 咖啡' },
    { id: 'miya',   initial: 'M',  name: 'Miya',  pct: 76, tags: '摄影 · 读书 · 旅行' },
    { id: 'kayla',  initial: 'K',  name: 'Kayla', pct: 71, tags: '脱口秀 · 音乐节' }
  ];

  const buddyBody = document.getElementById('buddy-body');
  const activated = localStorage.getItem('matchai_buddy_activated') === '1';

  if (!activated) {
    buddyBody.innerHTML = `
      <div class="activate-row" id="ac">
        <span class="ac-text">立即激活，认识合拍搭子</span>
        <svg class="ac-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    document.getElementById('ac').addEventListener('click', () => goPage('05_合拍搭子激活.html'));
  } else {
    buddyBody.innerHTML = buddyMatches.map(m => `
      <div class="row" data-id="${m.id}">
        <div class="mini-avatar">${m.initial}</div>
        <div class="row-info">
          <div class="row-name">${m.name} <span class="row-pct">${m.pct}%</span></div>
          <div class="row-tags">${m.tags}</div>
        </div>
        <svg class="row-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    `).join('');
    document.querySelectorAll('.row').forEach(r => {
      r.addEventListener('click', () => goPage('07_用户详情.html?id=' + r.dataset.id));
    });
  }

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
