<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 首页</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .page { display: flex; flex-direction: column; }

  .brandbar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 22px 10px;
  }
  .brand-name {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg);
  }
  .brand-name .dot { color: var(--accent); }
  .city-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; border-radius: var(--r-pill);
    background: var(--bg-elev); border: 1px solid var(--border);
    font-size: 12px; color: var(--fg); font-weight: 500;
    cursor: pointer; transition: all var(--d-1) var(--ease);
  }
  .city-chip:hover { border-color: var(--accent); color: var(--accent); }
  .city-chip svg { width: 12px; height: 12px; opacity: 0.7; }

  .tab-strip {
    flex-shrink: 0;
    display: flex; gap: 0;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-strip::-webkit-scrollbar { display: none; }
  .tchip {
    flex-shrink: 0;
    padding: 12px 12px 14px;
    margin-right: 4px;
    font-size: 14px; font-weight: 500;
    color: var(--fg-mute);
    cursor: pointer; position: relative; user-select: none;
    transition: color var(--d-1) var(--ease);
    scroll-snap-align: start;
    white-space: nowrap;
  }
  .tchip:hover { color: var(--fg); }
  .tchip.on { color: var(--accent); font-weight: 600; }
  .tchip.on::after {
    content: ''; position: absolute;
    left: 12px; right: 12px; bottom: -1px; height: 2px;
    background: var(--accent); border-radius: 1px;
  }
  .tchip.lock { color: var(--fg-faint); }

  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 18px 22px 22px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .state { display: none; }
  .state.show { display: block; animation: fadeIn 240ms var(--ease); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }

  /* Form */
  .form-h h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg); }
  .form-h p { margin-top: 4px; font-size: 13px; color: var(--fg-mute); }

  .wx-block { margin-top: 18px; }
  .wx-label { font-size: 12px; font-weight: 600; color: var(--fg); margin-bottom: 6px; }
  .wx-input {
    width: 100%; padding: 12px 14px;
    background: var(--bg-elev); border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: inherit; font-size: 15px; color: var(--fg);
    transition: border-color var(--d-1) var(--ease);
  }
  .wx-input:focus { outline: none; border-color: var(--accent); }
  .wx-hint { margin-top: 6px; font-size: 11px; color: var(--fg-faint); }

  .interest-block { margin-top: 22px; }
  .progress-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--fg-mute); margin-bottom: 8px;
  }
  .progress-row .count { font-weight: 700; color: var(--fg); }
  .cat { margin-top: 14px; }
  .cat-head {
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    font-size: 12px; font-weight: 600; color: var(--fg);
  }
  .cat-emoji { font-size: 14px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 7px 12px; border-radius: var(--r-pill);
    background: var(--bg-elev); border: 1.2px solid var(--border);
    font-size: 13px; color: var(--fg); font-weight: 500;
    cursor: pointer; user-select: none;
    transition: all var(--d-1) var(--ease); line-height: 1.2;
  }
  .tag:hover { border-color: var(--border-strong); }
  .tag.on { background: var(--accent); color: white; border-color: var(--accent); }

  .form-footer {
    position: sticky; bottom: 0;
    background: linear-gradient(180deg, transparent 0%, var(--bg-app) 30%);
    margin: 24px -22px -22px;
    padding: 16px 22px 22px;
  }

  /* Result */
  .res-h {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .res-h h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg); }
  .res-h .small { font-size: 12px; color: var(--fg-mute); }

  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all var(--d-1) var(--ease);
    box-shadow: var(--shadow-card);
  }
  .card:hover { transform: translateY(-2px); }
  .card:active { transform: scale(0.99); }
  .card.hot {
    border: 1.5px solid var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-card);
  }
  .card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .ava {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 19px; font-weight: 600; flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 12px var(--accent-soft);
  }
  .nm { flex: 1; min-width: 0; }
  .nm-line { display: flex; align-items: center; gap: 10px; }
  .nm-name { font-size: 16px; font-weight: 600; color: var(--fg); letter-spacing: -0.01em; }
  .nm-pct { font-size: 13px; font-weight: 700; color: var(--accent); }
  .nm-meta { font-size: 12px; color: var(--fg-mute); margin-top: 2px; }

  .quote {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic; font-weight: 400;
    font-size: 14px; color: var(--fg);
    line-height: 1.5;
    padding: 8px 0 8px 12px;
    border-left: 2px solid var(--accent);
    margin-bottom: 12px;
  }
  .quote-from {
    display: block;
    font-family: var(--font-sans); font-style: normal;
    font-size: 11px; color: var(--accent); font-weight: 600;
    margin-top: 4px; letter-spacing: 0.04em;
  }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    font-size: 11px; padding: 3px 9px;
    background: var(--accent-soft); color: var(--accent);
    border-radius: var(--r-pill); font-weight: 500;
  }

  /* Locked panes */
  .empty {
    text-align: center; padding: 80px 20px; color: var(--fg-faint);
  }
  .empty .e-emoji { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty .e-title { font-size: 14px; font-weight: 600; color: var(--fg-mute); margin-bottom: 4px; }
  .empty .e-sub { font-size: 12px; color: var(--fg-faint); line-height: 1.5; }

  .bottom-tab {
    flex-shrink: 0;
    display: flex; align-items: stretch;
    background: var(--bg-elev); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .btab {
    flex: 1; padding: 10px 0 8px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--fg-faint); cursor: pointer;
    transition: color var(--d-1) var(--ease);
  }
  .btab:hover, .btab.active { color: var(--accent); }
  .btab svg { width: 22px; height: 22px; stroke-width: 2; }
  .btab span { font-size: 10px; font-weight: 500; }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="brandbar">
    <span class="brand-name">Match AI<span class="dot">.</span></span>
    <span class="city-chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-7-7.58-7-13a7 7 0 0 1 14 0c0 5.42-7 13-7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
      <span id="city">杭州</span>
    </span>
  </div>

  <div class="tab-strip" id="tabs">
    <div class="tchip on" data-s="buddy">合拍搭子</div>
    <div class="tchip lock" data-s="lover">合拍伴侣</div>
    <div class="tchip lock" data-s="job">实习求职</div>
    <div class="tchip lock" data-s="skill">技能交换</div>
    <div class="tchip lock" data-s="barter">易物</div>
  </div>

  <div class="scroll" id="scroll">

    <div id="pane-buddy">
      <div class="state" id="buddy-A">
        <div class="form-h">
          <h2>填一下你的兴趣</h2>
          <p>选 3-5 个标签，匹配跟你合拍的搭子</p>
        </div>
        <div class="wx-block" id="wx-block">
          <div class="wx-label">微信号</div>
          <input class="wx-input" id="wx-input" type="text" placeholder="你的微信号" autocomplete="off"/>
          <div class="wx-hint">字母开头，6-20 位 · 一次填写所有场景通用</div>
        </div>
        <div class="interest-block">
          <div class="progress-row">
            <span>已选 <span class="count" id="count">0</span> / 至少 3</span>
            <span id="hint">还差 3 个</span>
          </div>
          <div id="cats"></div>
        </div>
        <div class="form-footer">
          <button class="btn-primary" id="submit" disabled>开始匹配</button>
        </div>
      </div>

      <div class="state" id="buddy-C">
        <div class="res-h">
          <h2>今日匹配</h2>
          <span class="small">3 个 · 明天 0 点更新</span>
        </div>
        <div id="card-list"></div>
        <p style="text-align:center;font-size:11px;color:var(--fg-faint);margin-top:14px;">
          明天还有 1 次新匹配 · 晚安
        </p>
      </div>
    </div>

    <div id="pane-lover" class="state">
      <div class="empty">
        <div class="e-emoji">💕</div>
        <div class="e-title">合拍伴侣</div>
        <div class="e-sub">每周四晚 8 点公布<br>暂未开放，敬请期待</div>
      </div>
    </div>
    <div id="pane-job" class="state">
      <div class="empty">
        <div class="e-emoji">💼</div>
        <div class="e-title">实习求职</div>
        <div class="e-sub">每周匹配同行/校友内推<br>暂未开放</div>
      </div>
    </div>
    <div id="pane-skill" class="state">
      <div class="empty">
        <div class="e-emoji">🔁</div>
        <div class="e-title">技能交换</div>
        <div class="e-sub">你会的 ↔ 你想学的<br>暂未开放</div>
      </div>
    </div>
    <div id="pane-barter" class="state">
      <div class="empty">
        <div class="e-emoji">🔄</div>
        <div class="e-title">易物</div>
        <div class="e-sub">闲置物品盲盒交换<br>暂未开放</div>
      </div>
    </div>

  </div>

  <div class="bottom-tab">
    <div class="btab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>首页</span>
    </div>
    <div class="btab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
      <span>圈子</span>
    </div>
    <div class="btab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

<script>
  const panes = ['buddy','lover','job','skill','barter'];

  document.querySelectorAll('.tchip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.tchip').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      const s = chip.dataset.s;
      panes.forEach(p => {
        const pane = document.getElementById('pane-' + p);
        if (!pane) return;
        if (p === s) {
          if (s === 'buddy') showBuddyState();
          else pane.classList.add('show');
        } else {
          if (p === 'buddy') {
            document.getElementById('buddy-A').classList.remove('show');
            document.getElementById('buddy-C').classList.remove('show');
          } else {
            pane.classList.remove('show');
          }
        }
      });
      document.getElementById('scroll').scrollTop = 0;
    });
  });

  function showBuddyState() {
    const activated = localStorage.getItem('matchai_buddy_activated');
    document.getElementById('buddy-A').classList.toggle('show', !activated);
    document.getElementById('buddy-C').classList.toggle('show', !!activated);
    if (activated) renderCards();
  }

  const categories = [
    { emoji: '🏃', name: '运动', tags: ['徒步','跑步','健身','瑜伽','骑行','球类','游泳','攀岩'] },
    { emoji: '🎬', name: '娱乐', tags: ['电影','音乐','演唱会','livehouse','脱口秀','桌游','剧本杀','KTV'] },
    { emoji: '📚', name: '学习', tags: ['读书','编程','设计','外语','写作','摄影','播客','AI'] },
    { emoji: '🍜', name: '生活', tags: ['美食','咖啡','烘焙','旅行','露营','宠物','花艺','手作'] },
    { emoji: '💼', name: '职业', tags: ['创业','互联网','金融','教育','医疗','设计师','产品','律师'] },
    { emoji: '✨', name: '社交', tags: ['游戏','社团','志愿者','派对','沙龙','市集','飞盘','滑板'] },
  ];

  document.getElementById('cats').innerHTML = categories.map(c => `
    <div class="cat">
      <div class="cat-head"><span class="cat-emoji">${c.emoji}</span><span>${c.name}</span></div>
      <div class="tags">${c.tags.map(t => `<div class="tag" data-t="${t}">${t}</div>`).join('')}</div>
    </div>
  `).join('');

  const existingWx = localStorage.getItem('matchai_wechat');
  if (existingWx) document.getElementById('wx-block').style.display = 'none';

  const wxInput = document.getElementById('wx-input');
  const submit = document.getElementById('submit');
  const count = document.getElementById('count');
  const hint = document.getElementById('hint');
  const selected = new Set();
  const WX_RE = /^[A-Za-z][A-Za-z0-9_-]{5,19}$/;

  document.querySelectorAll('.tag').forEach(t => {
    t.addEventListener('click', () => {
      const v = t.dataset.t;
      if (selected.has(v)) { selected.delete(v); t.classList.remove('on'); }
      else { if (selected.size >= 5) return; selected.add(v); t.classList.add('on'); }
      updateState();
    });
  });
  wxInput?.addEventListener('input', updateState);

  function wxValid() {
    if (existingWx) return true;
    return WX_RE.test(wxInput.value.trim());
  }
  function updateState() {
    const n = selected.size;
    count.textContent = n;
    hint.textContent = n < 3 ? `还差 ${3-n} 个` : (n>=5 ? '已满' : `还可以选 ${5-n} 个`);
    submit.disabled = !(n>=3 && wxValid());
  }

  submit.addEventListener('click', () => {
    if (submit.disabled) return;
    if (!existingWx) localStorage.setItem('matchai_wechat', wxInput.value.trim());
    localStorage.setItem('matchai_buddy_tags', JSON.stringify([...selected]));
    localStorage.setItem('matchai_buddy_activated', '1');
    showBuddyState();
    document.getElementById('scroll').scrollTop = 0;
  });

  const matches = [
    { id:'linxi', initial:'林', name:'林夕',  pct:92, gender:'女', age:23, city:'杭州', hot:true,  tags:['徒步','电影','咖啡'], quote:'你们都喜欢徒步、电影和咖啡。林夕周末常去万象城那家独立咖啡，可以约一起。' },
    { id:'miya',  initial:'M',  name:'Miya',  pct:76, gender:'女', age:25, city:'杭州', hot:false, tags:['摄影','读书','旅行'], quote:'Miya 也喜欢摄影和读书，可以聊聊最近在追的剧。' },
    { id:'kayla', initial:'K',  name:'Kayla', pct:71, gender:'女', age:24, city:'杭州', hot:false, tags:['脱口秀','音乐节'],   quote:'Kayla 是脱口秀爱好者，常去 livehouse。' }
  ];

  function renderCards() {
    document.getElementById('card-list').innerHTML = matches.map(m => `
      <div class="card ${m.hot?'hot':''}" data-id="${m.id}">
        <div class="card-top">
          <div class="ava">${m.initial}</div>
          <div class="nm">
            <div class="nm-line"><span class="nm-name">${m.name}</span><span class="nm-pct">${m.pct}%</span></div>
            <div class="nm-meta">${m.gender} · ${m.age} · ${m.city}</div>
          </div>
        </div>
        <div class="quote">"${m.quote}"<span class="quote-from">— Aurora · 你的分身</span></div>
        <div class="pills">${m.tags.map(t=>`<span class="pill">#${t}</span>`).join('')}</div>
      </div>
    `).join('');
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => goPage('07_用户详情.html?id=' + c.dataset.id));
    });
  }

  function goPage(target) {
    if (window.parent !== window) window.parent.postMessage({ type:'nav', page:target }, '*');
    else location.href = target;
  }

  showBuddyState();
  document.getElementById('city').textContent = localStorage.getItem('matchai_city') || '杭州';

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
