<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 首页</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .page { display: flex; flex-direction: column; }

  /* 顶部 brand bar */
  .brandbar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 24px 10px;
  }
  .brand-name {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg);
  }
  .brand-name .dot { color: var(--accent); }
  .city-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 10px; border-radius: var(--r-pill);
    background: var(--bg-elev); border: 1px solid var(--border);
    font-size: 12px; color: var(--fg); font-weight: 500;
    cursor: pointer;
    transition: all var(--d-1) var(--ease);
  }
  .city-chip:hover { border-color: var(--accent); color: var(--accent); }
  .city-chip svg { width: 12px; height: 12px; color: var(--fg-mute); }
  .city-chip:hover svg { color: var(--accent); }

  /* === 顶部 chip tab bar === */
  .tabbar-wrap {
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg-app);
  }
  .tabbar {
    display: flex; gap: 4px;
    padding: 6px 18px 0;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabbar::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    scroll-snap-align: start;
    position: relative;
    padding: 10px 14px 12px;
    font-size: 14px; font-weight: 500;
    color: var(--fg-faint);
    cursor: pointer;
    transition: color var(--d-1) var(--ease);
    white-space: nowrap;
    background: none; border: none;
  }
  .chip:hover { color: var(--fg-mute); }
  .chip.on {
    color: var(--accent);
    font-weight: 600;
  }
  .chip.on::after {
    content: '';
    position: absolute; left: 12px; right: 12px; bottom: 0;
    height: 2px; background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  /* 内容滚动 */
  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 16px 20px 20px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* === 状态 A：嵌入填信息 === */
  .form-hint {
    font-size: 13px; color: var(--fg-mute);
    margin-bottom: 14px; line-height: 1.5;
  }
  .form-hint strong { color: var(--fg); font-weight: 600; }

  .wx-block { margin-bottom: 18px; }
  .wx-label {
    font-size: 12px; font-weight: 600; color: var(--fg);
    margin-bottom: 6px; letter-spacing: 0.01em;
  }
  .wx-input {
    width: 100%; padding: 12px 14px;
    background: var(--bg-elev);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: inherit; font-size: 15px; color: var(--fg);
    transition: border-color var(--d-1) var(--ease);
  }
  .wx-input:focus { outline: none; border-color: var(--accent); }
  .wx-hint {
    margin-top: 6px;
    font-size: 11px; color: var(--fg-faint);
  }

  .progress-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--fg-mute);
    margin-bottom: 4px;
  }
  .progress-row .count { font-weight: 700; color: var(--fg); }

  .cat { margin-top: 14px; }
  .cat-head {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
    font-size: 12px; font-weight: 600;
    color: var(--fg);
    letter-spacing: 0.01em;
  }
  .cat-emoji { font-size: 14px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 7px 12px; border-radius: var(--r-pill);
    background: var(--bg-elev);
    border: 1.2px solid var(--border);
    font-size: 13px; color: var(--fg); font-weight: 500;
    cursor: pointer; user-select: none;
    transition: all var(--d-1) var(--ease);
    line-height: 1.2;
  }
  .tag:hover { border-color: var(--border-strong); }
  .tag.on {
    background: var(--accent); color: white; border-color: var(--accent);
  }

  .submit-wrap { margin-top: 22px; }

  /* === 状态 C：结果列表 === */
  .result-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .result-title {
    font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg);
  }
  .result-title .num {
    color: var(--accent);
  }
  .result-sub {
    font-size: 11px; color: var(--fg-faint);
    font-weight: 500;
  }

  /* === 高级匹配卡 === */
  .pcard {
    position: relative;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform var(--d-1) var(--ease), box-shadow var(--d-2) var(--ease);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .pcard::before {
    /* 顶部 inset 高光线 */
    content: '';
    position: absolute; left: 16px; right: 16px; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--inset-hi), transparent);
    pointer-events: none;
  }
  .pcard:hover {
    transform: translateY(-2px);
    box-shadow: 0 1px 0 var(--inset-hi) inset, 0 4px 8px rgba(10,10,11,0.06), 0 16px 36px rgba(10,10,11,0.10), 0 32px 60px rgba(10,10,11,0.06);
  }
  .pcard.high {
    border-color: transparent;
    box-shadow: var(--shadow-card), 0 0 0 1px var(--accent-soft), 0 16px 40px var(--accent-soft);
  }
  .pcard.high::after {
    /* 顶部渐变 accent 层 */
    content: '';
    position: absolute; left: 0; right: 0; top: 0; height: 60px;
    background: linear-gradient(180deg, var(--accent-soft), transparent);
    pointer-events: none;
    border-radius: 20px 20px 0 0;
  }

  .pcard-top {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 14px;
  }
  .pcard-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 20px; font-weight: 600;
    flex-shrink: 0;
    box-shadow: 0 0 0 1.5px var(--inset-hi) inset, 0 4px 14px var(--accent-soft), 0 1px 3px rgba(0,0,0,0.12);
  }
  .pcard-meta { flex: 1; min-width: 0; }
  .pcard-name-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .pcard-name {
    font-size: 17px; font-weight: 700; color: var(--fg);
    letter-spacing: -0.01em;
  }
  .pcard-pct {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.02em;
  }
  .pcard-bio {
    margin-top: 3px;
    font-size: 12px; color: var(--fg-mute);
  }

  .pcard-quote {
    position: relative; z-index: 1;
    margin: 14px 0 12px;
    padding: 10px 12px 10px 14px;
    border-left: 2px solid var(--accent);
    font-family: 'Fraunces', 'Inter', serif;
    font-style: italic;
    font-size: 14px; line-height: 1.5;
    color: var(--fg);
  }
  .pcard-quote-from {
    display: block;
    margin-top: 6px;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 11px; font-weight: 500;
    color: var(--fg-faint);
    letter-spacing: 0.04em;
    text-align: right;
  }

  .pcard-pills {
    position: relative; z-index: 1;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .pcard-pill {
    padding: 5px 11px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px; font-weight: 600;
    border-radius: var(--r-pill);
  }

  /* === 状态 B：等待 === */
  .wait-wrap {
    text-align: center;
    padding: 60px 20px;
  }
  .wait-emoji { font-size: 36px; margin-bottom: 12px; }
  .wait-title { font-size: 17px; font-weight: 700; color: var(--fg); margin-bottom: 6px; }
  .wait-sub { font-size: 13px; color: var(--fg-mute); }

  /* === 占位（其他 4 tab） === */
  .empty-tab {
    text-align: center;
    padding: 80px 24px;
    color: var(--fg-faint);
  }
  .empty-emoji { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--fg-mute); margin-bottom: 4px; }
  .empty-sub { font-size: 12px; color: var(--fg-faint); }

  /* 吸底 Tab */
  .tab-bar {
    flex-shrink: 0;
    display: flex; align-items: stretch;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .botab {
    flex: 1; padding: 10px 0 8px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--fg-faint);
    cursor: pointer;
    transition: color var(--d-1) var(--ease);
  }
  .botab:hover, .botab.active { color: var(--accent); }
  .botab svg { width: 22px; height: 22px; stroke-width: 2; }
  .botab span { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }

  /* Toast */
  .toast {
    position: absolute; top: 60px; left: 24px; right: 24px;
    padding: 12px 16px;
    background: var(--fg); color: var(--bg-elev);
    border-radius: var(--r-md);
    font-size: 13px; font-weight: 500;
    text-align: center;
    box-shadow: var(--shadow-2);
    transform: translateY(-20px); opacity: 0; pointer-events: none;
    transition: all var(--d-2) var(--ease);
    z-index: 50;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="brandbar">
    <span class="brand-name">Match AI<span class="dot">.</span></span>
    <span class="city-chip" onclick="showToast('城市切换待开放')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-7-7.58-7-13a7 7 0 0 1 14 0c0 5.42-7 13-7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
      <span id="city">杭州</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5"><polyline points="9 18 15 12 9 6"/></svg>
    </span>
  </div>

  <div class="tabbar-wrap">
    <div class="tabbar" id="tabbar">
      <button class="chip on" data-scene="buddy">合拍搭子</button>
      <button class="chip" data-scene="lover">合拍伴侣</button>
      <button class="chip" data-scene="job">实习求职</button>
      <button class="chip" data-scene="skill">技能交换</button>
      <button class="chip" data-scene="goods">易物</button>
    </div>
  </div>

  <div class="scroll" id="scroll"></div>

  <div class="tab-bar">
    <div class="botab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>首页</span>
    </div>
    <div class="botab" onclick="showToast('圈子 Tab 待阶段 3 实现')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
      <span>圈子</span>
    </div>
    <div class="botab" onclick="showToast('我的 Tab 待阶段 3 实现')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
      <span>我的</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function goPage(target) {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  }

  const city = localStorage.getItem('matchai_city') || '杭州';
  document.getElementById('city').textContent = city;

  // === 数据 ===
  const buddyMatches = [
    { id: 'linxi',  initial: '林', name: '林夕',  pct: 92, gender: '女', age: 23, city: '杭州',
      quote: '你们都喜欢徒步、电影和咖啡。', tags: ['徒步','电影','咖啡'] },
    { id: 'miya',   initial: 'M',  name: 'Miya',  pct: 84, gender: '女', age: 25, city: '杭州',
      quote: '你们对摄影和川西路线有共同的好奇。', tags: ['摄影','读书','旅行'] },
    { id: 'kayla',  initial: 'K',  name: 'Kayla', pct: 76, gender: '女', age: 24, city: '杭州',
      quote: '脱口秀和 livehouse 的小众喜好让你们对得上拍。', tags: ['脱口秀','音乐节'] }
  ];

  const categories = [
    { emoji: '🏃', name: '运动', tags: ['徒步','跑步','健身','瑜伽','骑行','球类','游泳','攀岩'] },
    { emoji: '🎬', name: '娱乐', tags: ['电影','音乐','演唱会','livehouse','脱口秀','桌游','剧本杀','KTV'] },
    { emoji: '📚', name: '学习', tags: ['读书','编程','设计','外语','写作','摄影','播客','AI'] },
    { emoji: '🍜', name: '生活', tags: ['美食','咖啡','烘焙','旅行','露营','宠物','花艺','手作'] },
    { emoji: '💼', name: '职业', tags: ['创业','互联网','金融','教育','医疗','设计师','产品','律师'] },
    { emoji: '✨', name: '社交', tags: ['游戏','社团','志愿者','派对','沙龙','市集','飞盘','滑板'] },
  ];

  const scroll = document.getElementById('scroll');
  let currentScene = 'buddy';

  function renderEmpty(label) {
    return `
      <div class="empty-tab">
        <div class="empty-emoji">🚧</div>
        <div class="empty-title">${label} · 暂未开放</div>
        <div class="empty-sub">即将上线，敬请期待</div>
      </div>
    `;
  }

  function renderResult() {
    const cards = buddyMatches.map(m => `
      <div class="pcard ${m.pct >= 85 ? 'high' : ''}" data-id="${m.id}">
        <div class="pcard-top">
          <div class="pcard-avatar">${m.initial}</div>
          <div class="pcard-meta">
            <div class="pcard-name-row">
              <span class="pcard-name">${m.name}</span>
              <span class="pcard-pct">${m.pct}%</span>
            </div>
            <div class="pcard-bio">${m.gender} · ${m.age} · ${m.city}</div>
          </div>
        </div>
        <div class="pcard-quote">
          "${m.quote}"
          <span class="pcard-quote-from">— Aurora</span>
        </div>
        <div class="pcard-pills">
          ${m.tags.map(t => `<span class="pcard-pill">#${t}</span>`).join('')}
        </div>
      </div>
    `).join('');

    return `
      <div class="result-head">
        <div class="result-title">今日匹配 <span class="num">${buddyMatches.length}</span> 个</div>
        <div class="result-sub">每天 1 次 · 明日刷新</div>
      </div>
      ${cards}
    `;
  }

  function renderForm() {
    const existingWx = localStorage.getItem('matchai_wechat');
    return `
      <div class="form-hint">填一下你的<strong>兴趣</strong>，开始匹配跟你合拍的搭子。</div>

      ${existingWx ? '' : `
        <div class="wx-block">
          <div class="wx-label">微信号</div>
          <input class="wx-input" id="wx-input" type="text" placeholder="你的微信号" autocomplete="off"/>
          <div class="wx-hint">字母开头，6-20 位</div>
        </div>
      `}

      <div class="progress-row">
        <span>已选 <span class="count" id="count">0</span> / 至少 3</span>
        <span id="progHint">还差 3 个</span>
      </div>

      <div id="cats">
        ${categories.map(c => `
          <div class="cat">
            <div class="cat-head">
              <span class="cat-emoji">${c.emoji}</span>
              <span>${c.name}</span>
            </div>
            <div class="tags">
              ${c.tags.map(t => `<div class="tag" data-t="${t}">${t}</div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      <div class="submit-wrap">
        <button class="btn-primary" id="submit" disabled>开始匹配</button>
      </div>
    `;
  }

  function bindForm() {
    const existingWx = localStorage.getItem('matchai_wechat');
    const wxInput = document.getElementById('wx-input');
    const count = document.getElementById('count');
    const hint = document.getElementById('progHint');
    const submit = document.getElementById('submit');
    const selected = new Set();

    function wxValid() {
      if (existingWx) return true;
      const v = wxInput?.value.trim() || '';
      return /^[A-Za-z][A-Za-z0-9_-]{5,19}$/.test(v);
    }

    function update() {
      const n = selected.size;
      count.textContent = n;
      if (n < 3) hint.textContent = '还差 ' + (3 - n) + ' 个';
      else hint.textContent = (n >= 5 ? '已满' : '还可以选 ' + (5 - n) + ' 个');
      submit.disabled = !(n >= 3 && wxValid());
    }

    document.querySelectorAll('.tag').forEach(t => {
      t.addEventListener('click', () => {
        const v = t.dataset.t;
        if (selected.has(v)) { selected.delete(v); t.classList.remove('on'); }
        else { if (selected.size >= 5) return; selected.add(v); t.classList.add('on'); }
        update();
      });
    });
    wxInput?.addEventListener('input', update);

    submit.addEventListener('click', () => {
      if (submit.disabled) return;
      if (!existingWx && wxInput) {
        localStorage.setItem('matchai_wechat', wxInput.value.trim());
      }
      localStorage.setItem('matchai_buddy_tags', JSON.stringify([...selected]));
      localStorage.setItem('matchai_buddy_activated', '1');
      renderScene(); // 同 tab 切到状态 C
    });
  }

  function bindResult() {
    document.querySelectorAll('.pcard').forEach(c => {
      c.addEventListener('click', () => goPage('07_用户详情.html?id=' + c.dataset.id));
    });
  }

  function renderScene() {
    if (currentScene !== 'buddy') {
      const labels = { lover: '合拍伴侣', job: '实习求职', skill: '技能交换', goods: '易物' };
      scroll.innerHTML = renderEmpty(labels[currentScene] || '');
      scroll.scrollTop = 0;
      return;
    }
    const activated = localStorage.getItem('matchai_buddy_activated') === '1';
    if (activated) {
      scroll.innerHTML = renderResult();
      bindResult();
    } else {
      scroll.innerHTML = renderForm();
      bindForm();
    }
    scroll.scrollTop = 0;
  }

  // tab 切换
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
      currentScene = c.dataset.scene;
      renderScene();
    });
  });

  renderScene();

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
