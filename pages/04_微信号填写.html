<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 填写微信号</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .topbar {
    height: 48px; padding: 0 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
  }
  .topbar .back svg { width: 18px; height: 18px; }

  .scroll {
    flex: 1; overflow-y: auto;
    padding: 8px 24px 24px;
    display: flex; flex-direction: column; gap: 24px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .header h1 {
    font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg); line-height: 1.3;
  }
  .header p {
    margin-top: 6px;
    font-size: 14px; color: var(--fg-mute);
    line-height: 1.55;
  }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-label {
    font-size: 13px; font-weight: 600;
    color: var(--fg);
    display: flex; justify-content: space-between; align-items: center;
  }
  .field-label .req { color: var(--accent); font-size: 11px; }

  .input {
    width: 100%; padding: 14px 16px;
    background: var(--bg-elev);
    border: 1.5px solid var(--border);
    border-radius: var(--r-md);
    font-family: inherit; font-size: 16px; color: var(--fg);
    transition: border-color var(--d-1) var(--ease);
  }
  .input::placeholder { color: var(--fg-faint); font-size: 14px; }
  .input:focus { outline: none; border-color: var(--accent); }
  .input.error { border-color: #EF4444; }
  .input.ok { border-color: #10B981; }

  .err-msg {
    font-size: 12px; color: #EF4444;
    min-height: 16px;
  }
  .ok-msg {
    font-size: 12px; color: #10B981;
    min-height: 16px;
  }

  /* 教程卡 */
  .tip-card {
    background: var(--accent-soft);
    border-radius: var(--r-md);
    padding: 14px 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .tip-card .ico {
    width: 20px; height: 20px; flex-shrink: 0;
    color: var(--accent);
  }
  .tip-card .ico svg { width: 100%; height: 100%; }
  .tip-card .text {
    font-size: 13px; color: var(--fg);
    line-height: 1.6;
  }
  .tip-card .text strong { color: var(--accent); }

  /* 警示 */
  .warn {
    font-size: 12px; color: #DC2626;
    background: rgba(239,68,68,0.06);
    border-left: 3px solid #DC2626;
    padding: 10px 14px;
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    line-height: 1.55;
  }

  .footer {
    flex-shrink: 0;
    padding: 16px 24px 24px;
    background: var(--bg-app);
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="topbar">
    <button class="back" data-back aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span style="font-size:13px;color:var(--fg-mute);font-weight:500;">填一次，所有场景通用</span>
    <span style="width:36px"></span>
  </div>

  <div class="scroll">
    <div class="header">
      <h1>请先填你的微信号</h1>
      <p>这是开始任何场景前的唯一一步。<br>填完后，匹配到的人才能加你，你也才能加 TA。</p>
    </div>

    <!-- 微信号 -->
    <div class="field">
      <div class="field-label">
        <span>你的微信号</span>
        <span class="req">必填</span>
      </div>
      <input type="text" class="input" id="wx1" placeholder="字母开头，6-20 位，字母/数字/下划线/减号" autocomplete="off" />
      <div class="err-msg" id="err1"></div>
    </div>

    <!-- 二次确认 -->
    <div class="field">
      <div class="field-label">
        <span>再输入一遍</span>
        <span class="req">必填</span>
      </div>
      <input type="text" class="input" id="wx2" placeholder="确认你的微信号" autocomplete="off" />
      <div class="err-msg" id="err2"></div>
    </div>

    <!-- 教程 -->
    <div class="tip-card">
      <div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </div>
      <div class="text">
        不知道你的微信号？<br>
        打开微信 → <strong>我</strong> → 点头像 → <strong>微信号</strong> 旁边长按复制粘贴过来。
      </div>
    </div>

    <!-- 警示 -->
    <div class="warn">
      <strong>请填真实微信号。</strong>乱填或填假号将被举报封号，并扣除信任分。
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" id="submit" disabled>完成 · 继续</button>
  </div>
</div>

<script>
  const wx1 = document.getElementById('wx1');
  const wx2 = document.getElementById('wx2');
  const err1 = document.getElementById('err1');
  const err2 = document.getElementById('err2');
  const submit = document.getElementById('submit');

  // 微信号格式：字母开头，6-20 位，字母/数字/下划线/减号
  const WX_RE = /^[a-zA-Z][a-zA-Z0-9_-]{5,19}$/;

  function validate() {
    const v1 = wx1.value.trim();
    const v2 = wx2.value.trim();
    let ok = true;

    if (v1) {
      if (!WX_RE.test(v1)) {
        wx1.classList.add('error'); wx1.classList.remove('ok');
        err1.textContent = '格式不对：字母开头，6-20 位，字母/数字/下划线/减号';
        ok = false;
      } else {
        wx1.classList.remove('error'); wx1.classList.add('ok');
        err1.textContent = '';
      }
    } else { ok = false; wx1.classList.remove('error', 'ok'); err1.textContent = ''; }

    if (v2) {
      if (v2 !== v1) {
        wx2.classList.add('error'); wx2.classList.remove('ok');
        err2.textContent = '两次输入不一致';
        ok = false;
      } else {
        wx2.classList.remove('error'); wx2.classList.add('ok');
        err2.textContent = '';
      }
    } else { ok = false; wx2.classList.remove('error', 'ok'); err2.textContent = ''; }

    submit.disabled = !ok;
  }

  wx1.addEventListener('input', validate);
  wx2.addEventListener('input', validate);

  submit.addEventListener('click', () => {
    if (submit.disabled) return;
    localStorage.setItem('matchai_wechat', wx1.value.trim());
    // 跳转到原本要去的页面
    const target = sessionStorage.getItem('matchai_after_wx') || '03_首页.html';
    sessionStorage.removeItem('matchai_after_wx');
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  });

  document.querySelector('[data-back]').addEventListener('click', () => {
    const target = '03_首页.html';
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  });

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
