<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 用户详情</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .page { display: flex; flex-direction: column; }
  .topbar {
    height: 48px; padding: 0 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
  }
  .topbar .back svg { width: 18px; height: 18px; }

  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 4px 24px 16px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* === Hero card：升级到与列表卡同款光感 === */
  .hero-card {
    position: relative;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px 20px 22px;
    box-shadow: var(--shadow-card), 0 0 0 1px var(--accent-soft), 0 16px 40px var(--accent-soft);
    overflow: hidden;
    text-align: center;
  }
  .hero-card::before {
    content: '';
    position: absolute; left: 18px; right: 18px; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--inset-hi), transparent);
    pointer-events: none;
  }
  .hero-card::after {
    content: '';
    position: absolute; left: 0; right: 0; top: 0; height: 100px;
    background: linear-gradient(180deg, var(--accent-soft), transparent);
    pointer-events: none; z-index: 0;
  }
  .hero-inner { position: relative; z-index: 1; }

  .big-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 36px; font-weight: 600;
    margin: 0 auto;
    box-shadow: 0 0 0 1.5px var(--inset-hi) inset, 0 8px 24px var(--accent-soft), 0 2px 6px rgba(0,0,0,0.12);
  }
  .hero-name {
    margin-top: 14px;
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg);
  }
  .hero-meta {
    margin-top: 4px;
    font-size: 13px; color: var(--fg-mute);
  }
  .pct-pill {
    margin-top: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: var(--r-pill);
    background: var(--accent-soft); color: var(--accent);
    font-size: 13px; font-weight: 700;
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    letter-spacing: -0.01em;
  }

  .section { margin-top: 22px; }
  .section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--fg-faint);
    margin-bottom: 10px;
  }

  .common-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .ctag {
    padding: 6px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 13px; font-weight: 600;
    border-radius: var(--r-pill);
  }

  .reason {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 2.5px solid var(--accent);
    padding: 14px 16px;
    border-radius: 0 14px 14px 0;
    font-family: 'Fraunces', 'Inter', serif;
    font-style: italic;
    font-size: 14.5px; color: var(--fg);
    line-height: 1.6;
    box-shadow: var(--shadow-1);
  }
  .reason-from {
    margin-top: 8px;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 11px; color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-align: right;
  }

  /* 隐私提示 */
  .privacy-note {
    margin-top: 14px;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    background: var(--bg-elev);
    border: 1px dashed var(--border-strong);
    border-radius: 12px;
    font-size: 12px; color: var(--fg-mute);
    line-height: 1.5;
  }
  .privacy-note svg {
    width: 16px; height: 16px;
    color: var(--fg-mute); flex-shrink: 0;
  }

  .footer {
    flex-shrink: 0;
    padding: 12px 22px 20px;
    background: var(--bg-app);
    border-top: 1px solid var(--border);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .toast {
    position: absolute; top: 56px; left: 50%; transform: translate(-50%, -20px);
    padding: 12px 18px;
    background: var(--fg); color: var(--bg-elev);
    border-radius: var(--r-md);
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-2);
    opacity: 0; pointer-events: none;
    transition: all var(--d-2) var(--ease);
    z-index: 50;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .toast svg { width: 16px; height: 16px; color: #10B981; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="topbar">
    <button class="back" data-back aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="topbar-title" style="font-size:16px;font-weight:600;color:var(--fg);letter-spacing:-0.01em;">TA 的资料</h2>
    <span style="width:36px"></span>
  </div>

  <div class="scroll" id="scroll"></div>

  <div class="footer">
    <button class="btn-primary" id="copy-btn">复制 TA 微信号</button>
  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-text">已复制</span>
  </div>
</div>

<script>

    },
    miya: {

    },
    kayla: {

      pct: 76, wx: 'kayla_lh',

    chenleyao: {

    },
    zhangzhe: {

      pct: 85, wx: 'zhangzhe_cs',
      common: ['计算机','大四','腾讯内推'],
      reason: '复旦计算机大四在读，已拿到腾讯 SP，可以帮你内推秋招。'
    },
    linxue: {
      initial: '林', name: '林雪', gender: '女', age: 24, city: '北京',
      pct: 78, wx: 'linxue_fin',
      common: ['金融','字节','已毕业'],
      reason: '浙大金融已毕业字节，互联网金融相关岗位有信息互通可能。'
    },
    wangqi: {
      initial: '王', name: '王琪', gender: '男', age: 24, city: '北京',
      pct: 70, wx: 'wangqi_pku',
      common: ['新传','研二','内容方向'],
      reason: '北大新传研二，对内容方向求职踩坑有共享经验。'
    },
    zhoulun: {
      initial: '周', name: '周伦', gender: '男', age: 26, city: '杭州',
      pct: 82, wx: 'zhoulun_dsn',
      common: ['Figma','PS','想学Python'],
      reason: '资深设计师，他想学 Python 自动化，你正好会，可以技能互换。'
    },
    liming: {
      initial: '李', name: '李明', gender: '男', age: 27, city: '杭州',
      pct: 79, wx: 'liming_dev',
      common: ['Python','后端','想学吉他'],
      reason: '程序员，下班想学吉他放松，你刚好能教入门。'
    },
    sushan: {
      initial: '苏', name: '苏珊', gender: '女', age: 28, city: '杭州',
      pct: 65, wx: 'sushan_jp',
      common: ['英语老师','想学日语'],
      reason: '英语老师，想学日语去东京旅居，你的日语口语正合适交换。'
    },
    anan: {
      initial: '阿', name: '阿楠', gender: '女', age: 24, city: '杭州',
      pct: 90, wx: 'anan_box',
      common: ['置身事内','泡泡玛特','易物'],
      reason: '她想用 2 本《置身事内》换泡泡玛特，你刚好相反，互补成交。'
    },
    // ===== 校园圈子 mock 用户 =====
    lib1:   { initial:'刘', name:'刘星辰', gender:'男', age:23, city:'浙大 玉泉', pct:84, wx:'liux_zju',  common:['考研','深度专注','早起'], reason:'TA 周一-五早 8 点固定在玉泉一楼，长期搭档型。' },
    st1:    { initial:'陈', name:'陈宁',   gender:'女', age:22, city:'浙大 紫金港', pct:79, wx:'chenn_zju', common:['每周4次','自律','5楼'], reason:'你们的自习时间高度重合，常去紫金港图书馆 5 楼。' },
    eat1:   { initial:'王', name:'王同学', gender:'男', age:24, city:'浙大 玉泉', pct:72, wx:'wangs_zju', common:['不吃辣','西餐','清淡'], reason:'你们都不吃辣，偏好西餐和清淡，可以组队点外卖。' },
    gym1:   { initial:'张', name:'张磊',   gender:'男', age:25, city:'浙大 紫金港', pct:81, wx:'zhang_g', common:['撸铁','增肌','晚 8 点'], reason:'TA 紫金港体育馆撸铁，增肌阶段，可以一起练。' },
    gym2:   { initial:'王', name:'王悦',   gender:'女', age:23, city:'浙大 紫金港', pct:74, wx:'wangy_p', common:['普拉提','瑜伽','下午'], reason:'TA 习惯下午练普拉提，节奏温和。' },
    kao1:   { initial:'李', name:'李知非', gender:'男', age:22, city:'浙大 西溪', pct:88, wx:'lizf_zju', common:['考研冲刺','本校','英语薄弱'], reason:'TA 也在准备本校研究生，英语薄弱想找互助伙伴。' },
    mov1:   { initial:'孙', name:'孙小可', gender:'女', age:24, city:'浙大 玉泉', pct:76, wx:'sunxk_z', common:['艺术片','独立电影','下周三'], reason:'TA 喜欢艺术片，下周三新片有空一起？' },
    gm1:    { initial:'赵', name:'赵杰',   gender:'男', age:23, city:'浙大 紫金港', pct:82, wx:'zhaoj_g', common:['LOL','黄金 ADC','晚 9 点'], reason:'TA 黄金段位 ADC，晚上 9-11 点常开。' }
  };

  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'linxi';
  const u = users[id] || users.linxi;

  document.getElementById('scroll').innerHTML = `
    <div class="hero-card">
      <div class="hero-inner">
        <div class="big-avatar">${u.initial}</div>
        <div class="hero-name">${u.name}</div>
        <div class="hero-meta">${u.gender} · ${u.age} 岁 · ${u.city}</div>
        <div class="pct-pill">合拍度 ${u.pct}%</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">共同点</div>
      <div class="common-tags">
        ${u.common.map(t => `<span class="ctag">#${t}</span>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">AI 推荐理由</div>
      <div class="reason">
        "${u.reason}"
        <div class="reason-from">— Aurora · 你的分身</div>
      </div>
    </div>

    <div class="privacy-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>为保护双方隐私，微信号不会展示。点底部按钮一键复制。</span>
    </div>
  `;

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-text').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard?.writeText(u.wx).catch(() => {});
    showToast('已复制 ' + u.name + ' 的微信号 · 去微信加 TA');
  });

  function goPage(target) {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  }
  document.querySelector('[data-back]').addEventListener('click', () => goPage('03_首页.html'));

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
