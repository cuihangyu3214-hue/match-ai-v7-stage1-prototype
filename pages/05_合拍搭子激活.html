<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 合拍搭子激活</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .page { display: flex; flex-direction: column; }
  .topbar {
    height: 48px; padding: 0 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
  }
  .topbar .back svg { width: 18px; height: 18px; }
  .topbar .step { font-size: 13px; color: var(--fg-mute); font-weight: 500; }

  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 4px 22px 12px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg); line-height: 1.3;
  }
  .header p {
    margin-top: 4px;
    font-size: 13px; color: var(--fg-mute); line-height: 1.5;
  }

  /* 微信号 */
  .wx-block { margin-top: 18px; }
  .wx-label {
    font-size: 12px; font-weight: 600; color: var(--fg);
    margin-bottom: 6px; letter-spacing: 0.01em;
  }
  .wx-input {
    width: 100%; padding: 12px 14px;
    background: var(--bg-elev);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: inherit; font-size: 15px; color: var(--fg);
    transition: border-color var(--d-1) var(--ease);
  }
  .wx-input:focus { outline: none; border-color: var(--accent); }
  .wx-hint {
    margin-top: 6px;
    font-size: 11px; color: var(--fg-faint);
  }

  /* 兴趣分类 */
  .interest-block { margin-top: 20px; }
  .progress-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--fg-mute);
    margin-bottom: 4px;
  }
  .progress-row .count { font-weight: 700; color: var(--fg); }

  .cat {
    margin-top: 14px;
  }
  .cat-head {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
    font-size: 12px; font-weight: 600;
    color: var(--fg);
    letter-spacing: 0.01em;
  }
  .cat-emoji { font-size: 14px; }
  .cat-name { color: var(--fg); }

  .tags {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .tag {
    padding: 7px 12px; border-radius: var(--r-pill);
    background: var(--bg-elev);
    border: 1.2px solid var(--border);
    font-size: 13px; color: var(--fg); font-weight: 500;
    cursor: pointer; user-select: none;
    transition: all var(--d-1) var(--ease);
    line-height: 1.2;
  }
  .tag:hover { border-color: var(--border-strong); }
  .tag.on {
    background: var(--accent); color: white; border-color: var(--accent);
  }

  .footer {
    flex-shrink: 0;
    padding: 12px 22px 20px;
    background: var(--bg-app);
    border-top: 1px solid var(--border);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="topbar">
    <button class="back" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="step">激活合拍搭子</span>
    <span style="width:36px"></span>
  </div>

  <div class="scroll">
    <div class="header">
      <h1>填一下你的兴趣</h1>
      <p>选 3-5 个标签，匹配跟你合拍的搭子。</p>
    </div>

    <!-- 微信号（可选隐藏） -->
    <div class="wx-block" id="wx-block">
      <div class="wx-label">微信号</div>
      <input class="wx-input" id="wx-input" type="text" placeholder="你的微信号" autocomplete="off"/>
      <div class="wx-hint">字母开头，6-20 位</div>
    </div>

    <div class="interest-block">
      <div class="progress-row">
        <span>已选 <span class="count" id="count">0</span> / 至少 3</span>
        <span id="hint">还差 3 个</span>
      </div>

      <div id="cats"></div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" id="submit" disabled>开始匹配</button>
  </div>
</div>

<script>
  // 6 类
  const categories = [
    { emoji: '🏃', name: '运动', tags: ['徒步','跑步','健身','瑜伽','骑行','球类','游泳','攀岩'] },
    { emoji: '🎬', name: '娱乐', tags: ['电影','音乐','演唱会','livehouse','脱口秀','桌游','剧本杀','KTV'] },
    { emoji: '📚', name: '学习', tags: ['读书','编程','设计','外语','写作','摄影','播客','AI'] },
    { emoji: '🍜', name: '生活', tags: ['美食','咖啡','烘焙','旅行','露营','宠物','花艺','手作'] },
    { emoji: '💼', name: '职业', tags: ['创业','互联网','金融','教育','医疗','设计师','产品','律师'] },
    { emoji: '✨', name: '社交', tags: ['游戏','社团','志愿者','派对','沙龙','市集','飞盘','滑板'] },
  ];

  // 渲染分类
  const catRoot = document.getElementById('cats');
  catRoot.innerHTML = categories.map(c => `
    <div class="cat">
      <div class="cat-head">
        <span class="cat-emoji">${c.emoji}</span>
        <span class="cat-name">${c.name}</span>
      </div>
      <div class="tags">
        ${c.tags.map(t => `<div class="tag" data-t="${t}">${t}</div>`).join('')}
      </div>
    </div>
  `).join('');

  // 微信号是否需要展示
  const existingWx = localStorage.getItem('matchai_wechat');
  const wxBlock = document.getElementById('wx-block');
  const wxInput = document.getElementById('wx-input');
  if (existingWx) {
    wxBlock.style.display = 'none';
  }

  // 选择
  const count = document.getElementById('count');
  const hint = document.getElementById('hint');
  const submit = document.getElementById('submit');
  const selected = new Set();

  document.querySelectorAll('.tag').forEach(t => {
    t.addEventListener('click', () => {
      const v = t.dataset.t;
      if (selected.has(v)) {
        selected.delete(v); t.classList.remove('on');
      } else {
        if (selected.size >= 5) return;
        selected.add(v); t.classList.add('on');
      }
      updateState();
    });
  });

  wxInput.addEventListener('input', updateState);

  function wxValid() {
    if (existingWx) return true;
    const v = wxInput.value.trim();
    return /^[A-Za-z][A-Za-z0-9_-]{5,19}$/.test(v);
  }

  function updateState() {
    const n = selected.size;
    count.textContent = n;
    if (n < 3) {
      hint.textContent = '还差 ' + (3 - n) + ' 个';
    } else {
      hint.textContent = (n >= 5 ? '已满' : '还可以选 ' + (5 - n) + ' 个');
    }
    submit.disabled = !(n >= 3 && wxValid());
  }

  submit.addEventListener('click', () => {
    if (submit.disabled) return;
    if (!existingWx) {
      localStorage.setItem('matchai_wechat', wxInput.value.trim());
    }
    localStorage.setItem('matchai_buddy_tags', JSON.stringify([...selected]));
    localStorage.setItem('matchai_buddy_activated', '1');
    goPage('06_匹配结果.html');
  });

  function goPage(target) {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: target }, '*');
    } else {
      location.href = target;
    }
  }

  document.querySelector('.back').addEventListener('click', () => goPage('03_首页.html'));

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
