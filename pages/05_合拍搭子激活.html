<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Match AI · 合拍搭子激活</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  .topbar {
    height: 48px; padding: 0 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg);
  }
  .topbar .back svg { width: 18px; height: 18px; }
  .topbar .step { font-size: 13px; color: var(--fg-mute); font-weight: 500; }

  .scroll {
    flex: 1; overflow-y: auto;
    padding: 8px 24px 16px;
    display: flex; flex-direction: column; gap: 24px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .header h1 {
    font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg); line-height: 1.3;
  }
  .header p {
    margin-top: 6px;
    font-size: 14px; color: var(--fg-mute); line-height: 1.55;
  }

  .progress-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--fg-mute);
  }
  .progress-row .count {
    font-weight: 600; color: var(--fg);
  }

  .tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .tag {
    padding: 10px 14px; border-radius: var(--r-pill);
    background: var(--bg-elev);
    border: 1.5px solid var(--border);
    font-size: 14px; color: var(--fg); font-weight: 500;
    cursor: pointer; user-select: none;
    transition: all var(--d-1) var(--ease);
  }
  .tag:hover { border-color: var(--border-strong); }
  .tag.on {
    background: var(--accent); color: white; border-color: var(--accent);
  }

  .footer {
    flex-shrink: 0;
    padding: 16px 24px 24px;
    background: var(--bg-app);
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
<div class="page">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c5-3 15-3 20 0"/><path d="M5 10c4-2 10-2 14 0"/><path d="M8 14c2-1 6-1 8 0"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
    </span>
  </div>

  <div class="topbar">
    <button class="back" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="step">合拍搭子 · 1 / 1</span>
    <span style="width:36px"></span>
  </div>

  <div class="scroll">
    <div class="header">
      <h1>选 3-5 个你感兴趣的</h1>
      <p>这些标签会用来匹配跟你合拍的搭子。可以随时在「我的」里更改。</p>
    </div>

    <div class="progress-row">
      <span>已选 <span class="count" id="count">0</span> / 至少 3</span>
      <span id="hint">还差 3 个</span>
    </div>

    <div class="tags" id="tags">
      <div class="tag" data-t="徒步">🥾 徒步</div>
      <div class="tag" data-t="撸铁">🏋️ 撸铁</div>
      <div class="tag" data-t="跑步">🏃 跑步</div>
      <div class="tag" data-t="瑜伽">🧘 瑜伽</div>
      <div class="tag" data-t="骑行">🚴 骑行</div>
      <div class="tag" data-t="桌游">🎲 桌游</div>
      <div class="tag" data-t="电影">🎬 电影</div>
      <div class="tag" data-t="音乐节">🎤 音乐节</div>
      <div class="tag" data-t="咖啡">☕ 咖啡</div>
      <div class="tag" data-t="读书">📖 读书</div>
      <div class="tag" data-t="摄影">📷 摄影</div>
      <div class="tag" data-t="美食">🍜 美食</div>
      <div class="tag" data-t="脱口秀">🎙️ 脱口秀</div>
      <div class="tag" data-t="创业">💡 创业</div>
      <div class="tag" data-t="编程">💻 编程</div>
      <div class="tag" data-t="设计">🎨 设计</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" id="submit" disabled>开始匹配</button>
  </div>
</div>

<script>
  const tags = document.querySelectorAll('.tag');
  const count = document.getElementById('count');
  const hint = document.getElementById('hint');
  const submit = document.getElementById('submit');
  const selected = new Set();

  tags.forEach(t => {
    t.addEventListener('click', () => {
      const v = t.dataset.t;
      if (selected.has(v)) {
        selected.delete(v); t.classList.remove('on');
      } else {
        if (selected.size >= 5) return;  // 最多 5
        selected.add(v); t.classList.add('on');
      }
      const n = selected.size;
      count.textContent = n;
      if (n < 3) {
        hint.textContent = '还差 ' + (3 - n) + ' 个';
        submit.disabled = true;
      } else {
        hint.textContent = (n >= 5 ? '已满' : '还可以选 ' + (5 - n) + ' 个');
        submit.disabled = false;
      }
    });
  });

  submit.addEventListener('click', () => {
    if (submit.disabled) return;
    localStorage.setItem('matchai_buddy_tags', JSON.stringify([...selected]));
    localStorage.setItem('matchai_buddy_activated', '1');
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: '06_匹配结果.html' }, '*');
    } else {
      location.href = '06_匹配结果.html';
    }
  });

  document.querySelector('.back').addEventListener('click', () => {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'nav', page: '03_首页.html' }, '*');
    } else {
      location.href = '03_首页.html';
    }
  });

  window.addEventListener('message', e => {
    if (e.data?.type === 'theme') document.documentElement.dataset.theme = e.data.value;
    if (e.data?.type === 'accent') document.documentElement.dataset.accent = e.data.value;
  });
</script>
</body>
</html>
